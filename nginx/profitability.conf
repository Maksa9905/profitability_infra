# profit.hakolr.dev  -> frontend (Docker, localhost:13030)
# api.profit.hakolr.dev -> backend API (Docker, localhost:8080)

server {
    listen 80;
    listen [::]:80;
    server_name profit.hakolr.dev api.profit.hakolr.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name profit.hakolr.dev;
    
    ssl_certificate     /home/deploy/ssl/fullchain.pem;
    ssl_certificate_key /home/deploy/ssl/privkey.pem;
    include /etc/nginx/snippets/profitability-ssl.conf;

    location / {
        proxy_pass http://127.0.0.1:13030;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.profit.hakolr.dev;
    
    ssl_certificate     /home/deploy/ssl/fullchain.pem;
    ssl_certificate_key /home/deploy/ssl/privkey.pem;
    include /etc/nginx/snippets/profitability-ssl.conf;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

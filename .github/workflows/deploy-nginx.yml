name: Deploy nginx

on:
  push:
    branches: [main]
    paths:
      - 'nginx/**'
      - 'scripts/install-nginx.sh'
      - '.github/workflows/deploy-nginx.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy nginx config to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 'nginx/profitability.conf,scripts/install-nginx.sh'
          target: ${{ secrets.VPS_INFRA_PATH }}

      - name: Install and reload nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_INFRA_PATH }}
            chmod +x scripts/install-nginx.sh
            ./scripts/install-nginx.sh

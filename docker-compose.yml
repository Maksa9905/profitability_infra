services:
  nginx:
    image: nginx:1.27-alpine
    container_name: profitability-nginx
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./nginx/profitability.conf:/etc/nginx/conf.d/profitability.conf:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - /home/deploy/ssl:/home/deploy/ssl:ro